; Projecte Ernest — Firmware ESP32-S3
; Massiu Soft SL · PlatformIO

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Libraries
lib_deps =
    ; IMU MPU-6050
    electroniccats/MPU6050 @ ^1.3.0
    ; BLE ja inclòs en ESP32 Arduino
    ; JSON per serialitzar paquets BLE
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32-s3-release]
extends = env:esp32-s3
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DNDEBUG
    -O2
