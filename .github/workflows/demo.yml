# ============================================================
# .github/workflows/demo.yml
# Ernest — Deploy demo pública a GitHub Pages
# URL: https://gemmagf.github.io/Nus/
# ============================================================
name: Demo GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build i deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instal·la dependències
        run: npm ci

      - name: Build demo (sense Supabase = mode demo automàtic)
        run: npm run build
        env:
          VITE_BASE_PATH: /Nus/

      - name: Configura Pages
        uses: actions/configure-pages@v4

      - name: Puja artefacte
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
