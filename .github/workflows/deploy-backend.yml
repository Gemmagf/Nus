# ============================================================
# .github/workflows/deploy-backend.yml
# Ernest — Deploy Backend → Railway
# S'executa quan es fa merge a main (après CI verd).
# ============================================================
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'backend/supabase/migrations/**'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Executar migracions SQL?'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ── Migracions Supabase ───────────────────────────────────────
  migrations:
    name: Supabase migrations
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && inputs.run_migrations == true ||
      contains(github.event.head_commit.message, '[migrate]')

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase db push \
            --db-url "${{ secrets.SUPABASE_DB_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Deploy Railway ────────────────────────────────────────────
  deploy-railway:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: []  # no depèn de migrations (opcional)
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service ernest-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for health check
        run: |
          echo "Esperant que l'API respongui..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_BASE_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API healthy (intent $i)"
              exit 0
            fi
            echo "Intent $i: HTTP $STATUS — reintentant en 10s..."
            sleep 10
          done
          echo "❌ L'API no ha respost en 2 minuts"
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deploy backend fallat',
              body: `Deploy de \`${context.sha.slice(0,7)}\` ha fallat. [Veure logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
